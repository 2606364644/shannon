[project]
name = "shannon-combined"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "shannon-core",
    "shannon-whitebox",
    "shannon-blackbox",
    "click>=8.0",
]

[project.scripts]
shannon = "shannon_combined.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shannon_combined"]
