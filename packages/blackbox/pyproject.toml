[project]
name = "shannon-blackbox"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "shannon-core",
    "temporalio>=1.0",
    "click>=8.0",
    "aiofiles>=23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shannon_blackbox"]
