[project]
name = "shannon-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "aiofiles>=23.0",
    "python-dotenv>=1.0",
    "tree-sitter>=0.24",
    "tree-sitter-python>=0.23",
    "tree-sitter-typescript>=0.23",
    "tree-sitter-go>=0.23",
    "tree-sitter-java>=0.23",
    "tree-sitter-php>=0.23",
    "claude-agent-sdk>=0.2.87",
    "anthropic>=0.40",
    "openai>=1.50",
    "temporalio>=1.0",
]

[project.scripts]
generate-totp = "shannon_core.scripts.generate_totp:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shannon_core"]
